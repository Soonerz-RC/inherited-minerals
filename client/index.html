<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Inherited Mineral Rights — Understand What You Inherited Before You Sign</title>
    <meta
      name="description"
      content="Plain-English help for people who inherited oil and gas mineral rights. Learn about probate, title, royalty checks, valuation, and offers — then request a private, no-pressure review."
    />
    <meta name="theme-color" content="#1F4A3D" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Inherited Mineral Rights" />
    <meta
      property="og:description"
      content="Understand what you inherited before you sign. Inheritance-specific education, a community Q&A, and a private review for mineral owners."
    />
    <meta property="og:site_name" content="InheritedMineralRights.com" />
    <meta property="og:url" content="https://www.inheritedmineralrights.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://www.inheritedmineralrights.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      Hidden Netlify Forms detection stubs. Netlify's build-time bot scans the
      static HTML to register forms; the live React forms then POST to "/" with
      a matching `form-name` (see client/src/lib/leads.ts). These elements are
      hidden and never submitted by users — they exist only so Netlify knows the
      form names and field set. Keep the field names in sync with leads.ts.
    -->
    <form name="private-review-request" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="state" />
      <input type="text" name="county" />
      <input type="text" name="producingStatus" />
      <input type="text" name="documents" />
      <textarea name="notes"></textarea>
      <input type="text" name="consent" />
      <input type="text" name="source_page" />
      <input type="text" name="landing_page" />
      <input type="text" name="referrer" />
      <input type="text" name="utm_source" />
      <input type="text" name="utm_medium" />
      <input type="text" name="utm_campaign" />
      <input type="text" name="utm_content" />
      <input type="text" name="utm_term" />
      <input type="text" name="bot-field" />
    </form>

    <form name="community-question" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="title" />
      <textarea name="body"></textarea>
      <input type="text" name="category" />
      <input type="text" name="state" />
      <input type="text" name="displayName" />
      <input type="text" name="source_page" />
      <input type="text" name="landing_page" />
      <input type="text" name="referrer" />
      <input type="text" name="utm_source" />
      <input type="text" name="utm_medium" />
      <input type="text" name="utm_campaign" />
      <input type="text" name="utm_content" />
      <input type="text" name="utm_term" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
