[build]
  command = "npm run build:client"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Map the app's /api/* calls to Netlify Functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — the app uses hash routing, so every path serves index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
